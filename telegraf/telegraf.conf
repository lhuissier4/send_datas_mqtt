# Telegraf : pont Mosquitto -> TimescaleDB.
# Lit les topics MQTT publies par mqtt_send.py et insere dans sensor_data.

[agent]
  interval = "10s"
  flush_interval = "5s"
  omit_hostname = true

# --- Entree : abonnement MQTT ------------------------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mspr2-mosquitto:1883"]
  topics = ["usine/iot/#"]
  qos = 1
  client_id = "telegraf"

  # Le payload est un JSON : {timestamp, id_machine, <capteur>: <valeur>}
  data_format = "json"
  name_override = "sensor_data"

  # On utilise le timestamp du message (donnees rejouees), pas l'heure d'ingestion.
  json_time_key = "timestamp"
  json_time_format = "2006-01-02 15:04:05"
  json_timezone = "UTC"

  # id_machine devient un tag ; la valeur capteur reste un champ numerique.
  tag_keys = ["id_machine"]

# --- Transformation : format large -> format long ----------------------------
# Apres parsing, le champ porte le nom du capteur (ex: iot_temperature).
# On le transforme en tag `sensor` + champ `value` pour coller au schema.
[[processors.starlark]]
  source = '''
def apply(metric):
    new = Metric("sensor_data")
    new.time = metric.time
    new.tags["id_machine"] = metric.tags["id_machine"]
    for k, v in metric.fields.items():
        new.tags["sensor"] = k
        new.fields["value"] = float(v)
    return new
'''

# --- Sortie : TimescaleDB ----------------------------------------------------
[[outputs.postgresql]]
  connection = "host=mspr2-timescaledb port=5432 user=${PG_USER} password=${PG_PASSWORD} dbname=${PG_DATABASE} sslmode=disable"
  # Insere dans la table existante `sensor_data` (time, id_machine, sensor, value).
  tags_as_foreign_keys = false
