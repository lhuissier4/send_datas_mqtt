# Telegraf : pont Mosquitto -> InfluxDB 3 (base sensor_staging).
# Lit les topics MQTT publies par mqtt_send.py et insere dans sensor_data.

[agent]
  interval = "10s"
  flush_interval = "5s"
  omit_hostname = true

# --- Entree : abonnement MQTT ------------------------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mspr2-mosquitto:1883"]
  topics = ["usine/iot/#"]
  qos = 1
  client_id = "telegraf"

  # Le payload est un JSON : {timestamp, id_machine, <capteur>: <valeur>}
  data_format = "json"
  name_override = "sensor_data"

  # Pas de json_time_key : InfluxDB affecte _time au moment de l'ingestion
  # (heure d'arrivee reelle), le timestamp du capteur (rejoue/simule) est
  # conserve comme simple champ via le processeur starlark ci-dessous.
  # json_string_fields est necessaire car le parser JSON ignore par defaut
  # les valeurs non numeriques : sans ca, "timestamp" (une chaine) serait
  # silencieusement supprime avant meme d'atteindre le starlark.
  json_string_fields = ["timestamp"]

  # id_machine devient un tag ; la valeur capteur reste un champ numerique.
  tag_keys = ["id_machine"]

# --- Transformation : format large -> format long ----------------------------
# Apres parsing, le champ porte le nom du capteur (ex: iot_temperature).
# On le transforme en tag `sensor` + champ `value` pour coller au schema,
# et on route `timestamp` vers le champ `sensor_timestamp` (ce n'est pas
# une mesure de capteur).
[[processors.starlark]]
  source = '''
def apply(metric):
    new = Metric("sensor_data")
    new.time = metric.time
    new.tags["id_machine"] = metric.tags["id_machine"]
    for k, v in metric.fields.items():
        if k == "timestamp":
            new.fields["sensor_timestamp"] = v
        else:
            new.tags["sensor"] = k
            new.fields["value"] = float(v)
    return new
'''

# --- Sortie : InfluxDB 3 staging (instance dediee) ---------------------------
[[outputs.influxdb_v3]]
  urls = ["http://mspr2-influxdb-staging:8181"]
  token = "${INFLUXDB_STAGING_TOKEN}"
  database = "${INFLUXDB_DATABASE_STAGING}"
