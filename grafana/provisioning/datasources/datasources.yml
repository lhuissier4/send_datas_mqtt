apiVersion: 1

datasources:
  - name: Postgres business_mspr
    uid: mspr2-postgres-business
    type: postgres
    access: proxy
    url: mspr2-postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    isDefault: false
    jsonData:
      sslmode: disable
    secureJsonData:
      password: ${POSTGRES_PASSWORD}

  # InfluxDB 3 Core n'a pas de Flight SQL/gRPC (verifie contre l'image
  # influxdb:3-core, cf. design.md) : la datasource InfluxDB officielle de
  # Grafana ne peut donc pas s'y connecter en mode SQL. On utilise le
  # plugin communautaire Infinity pour appeler directement l'endpoint HTTP
  # /api/v3/query_sql, le meme que celui utilise par parquet_flush.py /
  # load_maintenance.py.
  - name: InfluxDB sensor_live (Infinity)
    uid: mspr2-influxdb-live-infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    isDefault: true
    jsonData:
      auth_method: bearerToken
      allowedHosts:
        - http://mspr2-influxdb-live:8181
    secureJsonData:
      bearerToken: ${INFLUXDB_LIVE_TOKEN}
